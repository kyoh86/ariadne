# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2
project_name: ariadne

builds:
  - id: default
    main: ./cmd/ariadne
    binary: ariadne
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: archive
    formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    files:
      - LICENSE*
      - README*

checksum:
  name_template: checksums.txt
